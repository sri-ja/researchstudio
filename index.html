<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResearchStudio</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              slate: {
                850: '#1e293b',
                900: '#0f172a',
                950: '#020617',
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Global Selection Style */
      ::selection {
        background: rgba(99, 102, 241, 0.4); /* Indigo-500 with opacity */
        color: white;
      }

      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0f172a; 
      }
      ::-webkit-scrollbar-thumb {
        background: #334155; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #475569; 
      }

      /* PDF.js Layout */
      .pdf-container {
        position: relative;
        overflow: auto;
        user-select: none; /* Prevent selection of the container background */
      }
      .pdf-page {
        position: relative;
        margin: 0 auto 20px auto;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        background-color: white;
        user-select: none;
      }
      
      /* PDF.js Text Layer - Precise Alignment */
      .textLayer {
        position: absolute;
        text-align: initial;
        left: 0;
        top: 0;
        right: 0;
        bottom: 0;
        overflow: hidden;
        opacity: 1; /* Fixed: Must be 1 for selection to be visible. Spans are transparent. */
        line-height: 1.0;
        text-size-adjust: none;
        forced-color-adjust: none;
        transform-origin: 0 0;
        z-index: 2;
        user-select: text; /* Only allow text selection here */
      }

      .textLayer span {
        color: transparent;
        position: absolute;
        white-space: pre;
        cursor: text;
        transform-origin: 0% 0%;
      }

      /* PDF Specific Selection: Blue Overlay */
      .textLayer ::selection {
        background: rgba(59, 130, 246, 0.4); /* Blue-500 with opacity */
        color: transparent; /* Keep text transparent so underlying canvas shows */
      }
      
      /* Highlight Overlay */
      .highlight-layer {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none; /* Let clicks pass through to text layer */
        z-index: 1;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.33.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "pdfjs-dist": "https://esm.sh/pdfjs-dist@3.11.174",
    "marked": "https://esm.sh/marked@12.0.0",
    "idb": "https://esm.sh/idb@8.0.0"
  }
}
</script>
</head>
  <body class="bg-slate-950 text-slate-200 antialiased overflow-hidden h-screen w-screen">
    <div id="root" class="h-full w-full"></div>
  </body>
</html>
